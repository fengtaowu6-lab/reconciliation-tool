<!DOCTYPE html>

<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>来货智能对账系统 V3.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
    <link href="./1_files/css2" rel="stylesheet">
    <script src="./1_files/xlsx.full.min.js.下载"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #10B981;
            --primary-dark: #059669;
            --success: #08a06e;
            --success-light: #e8f4f1;
            --danger: #d81e06;
            --gray-hint: #b8b8b8;
            --warning: #F59E0B;
            --warning-light: #FEF3C7;
            --warning-border: #FCD34D;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.1);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-full: 9999px;
        }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #E0F7FA 0%, #C8E6C9 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            padding: 16px;
        }
        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 10%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 90%, rgba(6, 182, 212, 0.06) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        /* 标题栏 */
        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .header-title {
            flex: 1;
        }
        .header-title h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-800);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .version {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), #34D399);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: var(--radius-full);
        }
        .header-subtitle {
            font-size: 13px;
            color: var(--gray-500);
            margin-top: 2px;
        }
        .config-btn {
            padding: 6px 12px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
            border: none;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .config-btn:hover {
            background: rgba(16, 185, 129, 0.2);
        }
        /* 配置面板 */
        .config-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-md);
            display: none;
            transform: translateY(-10px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        .config-panel.show {
            display: block;
            transform: translateY(0);
            opacity: 1;
        }
        .config-panel h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 16px;
        }
        .config-item {
            margin-bottom: 12px;
        }
        .config-item label {
            display: block;
            font-size: 13px;
            color: var(--gray-600);
            margin-bottom: 6px;
        }
        .config-item input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-md);
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .config-item input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .config-save-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .config-save-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        .config-tip {
            font-size: 11px;
            color: var(--gray-400);
            margin-top: 8px;
            text-align: center;
        }
        /* 提示条 */
        .notice-bar {
            background: var(--warning-light);
            border: 1px solid var(--warning-border);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #92400E;
            display: none;
        }
        .notice-bar.show {
            display: block;
        }
        .notice-bar strong {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
        }
        /* 卡片通用样式 */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-md);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
        }
        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .icon {
            font-size: 18px;
        }
        /* 上传区域 */
        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .upload-zone {
            background: white;
            border: 2px dashed var(--gray-300);
            border-radius: var(--radius-md);
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.03);
        }
        .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.08);
            transform: scale(1.01);
        }
        /* 上传成功状态 - 新样式 */
        .upload-zone.success {
            border-color: #08a06e;
            border-style: solid;
            background: #08a06e;
        }
        .upload-zone.success .icon svg {
            stroke: #ffffff !important;
        }
        .upload-zone.success .title {
            color: #ffffff;
        }
        .upload-zone.success .subtitle {
            color: rgba(255, 255, 255, 0.8);
        }
        .upload-zone.success .file-name {
            color: rgba(255, 255, 255, 0.9);
        }
        .upload-zone .icon {
            font-size: 36px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upload-zone .title {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 4px;
            transition: color 0.3s ease;
        }
        .upload-zone .subtitle {
            font-size: 12px;
            color: var(--gray-400);
            transition: color 0.3s ease;
        }
        .upload-zone .file-name {
            font-size: 11px;
            color: var(--primary);
            font-weight: 600;
            margin-top: 8px;
            word-break: break-all;
            display: none;
            transition: color 0.3s ease;
        }
        .upload-zone.success .file-name {
            display: block;
        }
        .upload-zone .check-icon {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 22px;
            height: 22px;
            background: #ffffff;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: #08a06e;
            font-size: 12px;
            font-weight: bold;
        }
        .upload-zone.success .check-icon {
            display: flex;
        }
        .upload-zone input[type="file"] {
            display: none;
        }
        /* 进度区域 */
        .progress-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .circle-progress {
            position: relative;
            width: 64px;
            height: 64px;
            flex-shrink: 0;
        }
        .circle-progress svg {
            transform: rotate(-90deg);
        }
        .circle-progress .bg {
            fill: none;
            stroke: var(--gray-200);
            stroke-width: 5;
        }
        .circle-progress .progress {
            fill: none;
            stroke: url(#progressGradient);
            stroke-width: 5;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }
        .circle-progress .percent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15px;
            font-weight: 700;
            color: var(--gray-800);
        }
        .progress-info {
            flex: 1;
        }
        .progress-status {
            font-size: 14px;
            color: var(--gray-600);
            margin-bottom: 10px;
            min-height: 20px;
        }
        .progress-bar {
            height: 8px;
            background: var(--gray-200);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #34D399);
            border-radius: var(--radius-full);
            transition: width 0.5s ease;
            width: 0%;
        }
        /* 新核对结果卡片样式 */
        .result-card {
            background: #e8f4f1;
            border: 1px solid rgba(8, 160, 110, 0.2);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s ease;
        }
        .result-card:last-child {
            margin-bottom: 0;
        }
        .result-card-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .result-card-icon.success {
            background: rgba(8, 160, 110, 0.15);
        }
        .result-card-icon.error {
            background: rgba(216, 30, 6, 0.15);
        }
        .result-card-content {
            flex: 1;
        }
        .result-card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 3px;
        }
        .result-card-hint {
            font-size: 12px;
            color: #b8b8b8;
        }
        .result-card-status {
            text-align: right;
            flex-shrink: 0;
        }
        .result-card-status-icon {
            margin-bottom: 3px;
            display: flex;
            justify-content: flex-end;
        }
        .result-card-status-text {
            font-size: 13px;
            font-weight: 600;
        }
        .result-card-status-text.success {
            color: #08a06e;
        }
        .result-card-status-text.error {
            color: #d81e06;
        }
        /* 按钮 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(16, 185, 129, 0.5);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: white;
            color: var(--gray-600);
            border: 1px solid var(--gray-200);
        }
        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
        }
        /* 下载按钮 */
        .btn-download {
            background: #08a06e;
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(8, 160, 110, 0.35);
        }
        .btn-download:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(8, 160, 110, 0.45);
        }
        /* 隐藏/显示 */
        .hidden {
            display: none !important;
        }
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gray-800);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-full);
            font-size: 14px;
            box-shadow: var(--shadow-lg);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题栏 -->
        <div class="header">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <line x1="10" y1="9" x2="8" y2="9"/>
                </svg>
            </div>
            <div class="header-title">
                <h1>来货智能对账系统<span class="version">V3.0</span></h1>
                <div class="header-subtitle">AI 智能核对 · 精准高效</div>
            </div>
            <button class="config-btn" onclick="toggleConfig()">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;">
                    <path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/>
                    <path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>
                    <path d="M12 2v2"/>
                    <path d="M12 20v2"/>
                    <path d="m4.93 4.93 1.41 1.41"/>
                    <path d="m17.66 17.66 1.41 1.41"/>
                    <path d="M2 12h2"/>
                    <path d="M20 12h2"/>
                    <path d="m6.34 17.66-1.41 1.41"/>
                    <path d="m19.07 4.93-1.41 1.41"/>
                </svg>
                API配置
            </button>
        </div>

        <!-- 配置面板 -->
        <div class="config-panel" id="configPanel">
            <h3>🔧 API 配置</h3>
            <div class="config-item">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="输入您的火山方舟API Key">
            </div>
            <div class="config-item">
                <label>Endpoint ID</label>
                <input type="text" id="endpointId" placeholder="输入您的模型Endpoint ID">
            </div>
            <button class="config-save-btn" onclick="saveConfig()">保存配置</button>
            <p class="config-tip">配置仅保存在您的本地浏览器中，不会上传到任何服务器</p>
        </div>

        <!-- 提示条 -->
        <div class="notice-bar" id="noticeBar">
            <strong>🎯 当前未配置API</strong>
            请先点击右上角的「API配置」填写您的火山方舟API信息，才能使用AI图片分析功能
        </div>

        <!-- 上传区域 -->
        <div class="card">
            <div class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px; color: var(--warning);">
                    <path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2"/>
                </svg>
                上传对账文件
            </div>
            <div class="upload-grid">
                <div class="upload-zone" id="excelZone" onclick="document.getElementById(&#39;excelInput&#39;).click()">
                    <div class="check-icon">✓</div>
                    <div class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <path d="M8 13h2"/>
                            <path d="M8 17h2"/>
                            <path d="M14 13h2"/>
                            <path d="M14 17h2"/>
                        </svg>
                    </div>
                    <div class="title">上传到货表格</div>
                    <div class="subtitle">支持 .xlsx / .csv</div>
                    <div class="file-name" id="excelFileName"></div>
                    <input type="file" id="excelInput" accept=".xlsx,.csv" onchange="handleExcelUpload(event)">
                </div>
                <div class="upload-zone" id="imageZone" onclick="document.getElementById(&#39;imageInput&#39;).click()">
                    <div class="check-icon">✓</div>
                    <div class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
                            <circle cx="9" cy="9" r="2"/>
                            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
                        </svg>
                    </div>
                    <div class="title">上传来货图片</div>
                    <div class="subtitle">支持 .jpg / .png</div>
                    <div class="file-name" id="imageFileName"></div>
                    <input type="file" id="imageInput" accept=".jpg,.jpeg,.png" onchange="handleImageUpload(event)">
                </div>
            </div>
        </div>

        <!-- 进度区域 -->
        <div class="card" id="progressCard">
            <div class="card-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px; color: var(--warning);">
                    <path d="M5 22h14"/>
                    <path d="M5 2h14"/>
                    <path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/>
                    <path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/>
                </svg>
                核对进度
            </div>
            <div class="progress-section">
                <div class="circle-progress">
                    <svg width="64" height="64">
                        <defs>
                            <lineargradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#10B981"></stop>
                                <stop offset="100%" style="stop-color:#34D399"></stop>
                            </lineargradient>
                        </defs>
                        <circle class="bg" cx="32" cy="32" r="28"></circle>
                        <circle class="progress" id="progressCircle" cx="32" cy="32" r="28" stroke-dasharray="175.9" stroke-dashoffset="175.9" style="stroke-dashoffset: 175.929;"></circle>
                    </svg>
                    <span class="percent" id="progressPercent">0%</span>
                </div>
                <div class="progress-info">
                    <div class="progress-status" id="progressStatus">等待上传文件...</div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 全局变量
        let excelData = null;
        let tableSummary = null;
        let tableTotal = 0;
        let imageFile = null;
        let reconciliationData = [];
        let hasErrors = false;

        // 智能切片分级上限
        const MAX_SLICES = 32;
        const COMPRESS_THRESHOLD = 16000;

        // Toast 提示
        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        // 更新进度
        function updateProgress(percent, status) {
            const percentText = Math.round(percent) + '%';
            document.getElementById('progressPercent').textContent = percentText;
            document.getElementById('progressStatus').textContent = status;
            document.getElementById('progressFill').style.width = percent + '%';
            
            // 圆形进度
            const circumference = 2 * Math.PI * 28;
            const offset = circumference - (percent / 100) * circumference;
            document.getElementById('progressCircle').style.strokeDashoffset = offset;
        }

        // 清理款号
        function cleanSpecCode(code) {
            let codeStr = String(code).trim();
            if (codeStr.includes('-')) {
                return codeStr.split('-')[0];
            }
            return codeStr;
        }

        // 切换配置面板
        function toggleConfig() {
            const panel = document.getElementById('configPanel');
            panel.classList.toggle('show');
        }

        // 保存配置
        function saveConfig() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const endpointId = document.getElementById('endpointId').value.trim();
            
            if (!apiKey || !endpointId) {
                showToast('请填写完整的API配置信息');
                return;
            }
            
            localStorage.setItem('reconciliation_api_key', apiKey);
            localStorage.setItem('reconciliation_endpoint', endpointId);
            
            showToast('配置已保存到本地');
            toggleConfig();
            checkNoticeBar();
            checkReady();
        }

        // 加载配置
        function loadConfig() {
            const savedApiKey = localStorage.getItem('reconciliation_api_key');
            const savedEndpoint = localStorage.getItem('reconciliation_endpoint');
            
            if (savedApiKey) {
                document.getElementById('apiKey').value = savedApiKey;
            }
            if (savedEndpoint) {
                document.getElementById('endpointId').value = savedEndpoint;
            }
            
            checkNoticeBar();
        }

        // 检查提示条
        function checkNoticeBar() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const endpointId = document.getElementById('endpointId').value.trim();
            const noticeBar = document.getElementById('noticeBar');
            
            if (!apiKey || !endpointId) {
                noticeBar.classList.add('show');
            } else {
                noticeBar.classList.remove('show');
            }
        }

        // Excel 上传处理
        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const zone = document.getElementById('excelZone');
            document.getElementById('excelFileName').textContent = file.name;
            zone.classList.add('success');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rawData = XLSX.utils.sheet_to_json(firstSheet);
                    
                    // 处理列名
                    rawData.forEach(row => {
                        Object.keys(row).forEach(key => {
                            const newKey = key.trim();
                            if (newKey !== key) {
                                row[newKey] = row[key];
                                delete row[key];
                            }
                        });
                    });
                    
                    // 检查必需列
                    const requiredCols = ['货品规格编码', '数量', '结算金额'];
                    const firstRow = rawData[0] || {};
                    const missingCols = requiredCols.filter(col => !firstRow.hasOwnProperty(col));
                    
                    if (missingCols.length > 0) {
                        showToast(`表格缺少必需列：${missingCols.join(', ')}`);
                        zone.classList.remove('success');
                        return;
                    }
                    
                    // 处理数据
                    const summary = {};
                    let total = 0;
                    
                    rawData.forEach(row => {
                        const code = cleanSpecCode(row['货品规格编码']);
                        const qty = parseFloat(row['数量']) || 0;
                        const amount = parseFloat(row['结算金额']) || 0;
                        
                        total += amount;
                        
                        if (!summary[code]) {
                            summary[code] = {
                                数量: 0,
                                结算金额: 0
                            };
                        }
                        summary[code].数量 += qty;
                        summary[code].结算金额 += amount;
                    });
                    
                    excelData = rawData;
                    tableSummary = summary;
                    tableTotal = total;
                    
                    showToast(`表格读取成功，共 ${rawData.length} 条记录`);
                    checkReady();
                } catch (err) {
                    showToast('表格解析失败：' + err.message);
                    zone.classList.remove('success');
                    excelData = null;
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // 图片上传处理
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // 检查文件大小
            if (file.size > 20 * 1024 * 1024) {
                showToast('图片文件超过20MB，请压缩后再上传！');
                return;
            }
            
            const zone = document.getElementById('imageZone');
            document.getElementById('imageFileName').textContent = file.name;
            zone.classList.add('success');
            
            imageFile = file;
            showToast('图片上传成功');
            checkReady();
        }

        // 拖拽上传
        ['excelZone', 'imageZone'].forEach(id => {
            const zone = document.getElementById(id);
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.classList.add('dragover');
            });
            zone.addEventListener('dragleave', () => {
                zone.classList.remove('dragover');
            });
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) {
                    if (id === 'excelZone') {
                        document.getElementById('excelInput').files = e.dataTransfer.files;
                        handleExcelUpload({ target: { files: [file] } });
                    } else {
                        document.getElementById('imageInput').files = e.dataTransfer.files;
                        handleImageUpload({ target: { files: [file] } });
                    }
                }
            });
        });

        // 检查是否准备就绪
        function checkReady() {
            const startBtn = document.getElementById('startBtn');
            const apiKey = document.getElementById('apiKey').value.trim();
            const endpointId = document.getElementById('endpointId').value.trim();
            
            if (tableSummary && imageFile && apiKey && endpointId) {
                startBtn.disabled = false;
                updateProgress(0, '准备就绪，点击开始核算');
            } else {
                startBtn.disabled = true;
                if (!apiKey || !endpointId) {
                    updateProgress(0, '请先完成API配置');
                } else {
                    updateProgress(0, '等待上传文件...');
                }
            }
        }

        // 处理图片切片
        async function processImageForAI(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        let w = img.width;
                        let h = img.height;
                        const base64Images = [];
                        
                        if (h > w * 2) {
                            let slice_h = Math.floor(w * 1.5);
                            let overlap = Math.floor(w * 0.2);
                            let step = slice_h - overlap;
                            
                            let required_slices = Math.ceil(h / step);
                            let target_slices, need_compress;
                            
                            if (required_slices <= 4) {
                                target_slices = 4;
                                need_compress = false;
                            } else if (required_slices <= 8) {
                                target_slices = 8;
                                need_compress = false;
                            } else if (required_slices <= 16) {
                                target_slices = 16;
                                need_compress = false;
                            } else if (required_slices <= MAX_SLICES) {
                                target_slices = required_slices;
                                need_compress = false;
                            } else {
                                target_slices = MAX_SLICES;
                                need_compress = true;
                            }
                            
                            if (need_compress) {
                                const compress_h = step * MAX_SLICES + slice_h - step;
                                const scale = compress_h / h;
                                w = Math.floor(w * scale);
                                h = compress_h;
                                
                                // 压缩图片
                                const canvas = document.createElement('canvas');
                                canvas.width = w;
                                canvas.height = h;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, w, h);
                                img.src = canvas.toDataURL('image/jpeg', 0.9);
                                
                                // 重新计算切片参数
                                slice_h = Math.floor(w * 1.5);
                                step = slice_h - overlap;
                            }
                            
                            const all_slices = [];
                            for (let i = 0; i < h; i += step) {
                                all_slices.push([0, i, w, Math.min(i + slice_h, h)]);
                                if (i + slice_h >= h) break;
                            }
                            
                            let slices;
                            if (all_slices.length > target_slices) {
                                const indices = [];
                                for (let i = 0; i < target_slices; i++) {
                                    indices.push(Math.floor(i * all_slices.length / target_slices));
                                }
                                slices = indices.map(idx => all_slices[idx]);
                            } else {
                                slices = all_slices;
                            }
                            
                            // 保留最后一片
                            const last = [0, Math.max(0, h - slice_h), w, h];
                            if (JSON.stringify(slices[slices.length-1]) !== JSON.stringify(last)) {
                                slices[slices.length-1] = last;
                            }
                            
                            // 生成切片
                            for (const box of slices) {
                                const canvas = document.createElement('canvas');
                                canvas.width = box[2] - box[0];
                                canvas.height = box[3] - box[1];
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, box[0], box[1], box[2]-box[0], box[3]-box[1], 0, 0, canvas.width, canvas.height);
                                const b64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
                                base64Images.push(b64);
                            }
                        } else {
                            // 小图直接转base64
                            base64Images.push(e.target.result.split(',')[1]);
                        }
                        
                        resolve(base64Images);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // 调用大模型
        async function callVisionModel(base64Images) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const endpointId = document.getElementById('endpointId').value.trim();
            
            const promptText = `
            你是一个极其严谨的财务对账助手，负责精准提取发货单图片中的信息。
            ⚠️ 特别说明：为了保证清晰度，我把一张长图切成了 ${base64Images.length} 张短图发给你。
            【重中之重】：这些切片图片的上下边缘有【重叠部分】（为了防止把字切断）。如果你发现两张图的连接处出现了完全一样的商品（款号和数量一样），那是重叠导致的，**绝对不要重复计算！只算一次！**
            要求：
            1. 提取最末尾的"本单欠款"或"合计"金额。
            2. 提取所有的商品明细，列出：款号、数量、总金额。
            ⚠️【严禁幻觉的提取规则】：
            - 【款号】：必须是4位或5位的纯数字，且必须以数字"7"或者"8"“9”开头！其余文字一律忽略。
            - 【数量与金额】：图片上的明细严格遵循公式格式，例如"55元 × 1件= ￥ 55"。务必且只能从这个算式中提取数字，绝对不要自己做乘法！
            请务必只输出合法的 JSON 字符串，格式如下：
            {"总计": 11008.0, "明细": [{"款号": "8851", "数量": 3, "总金额": 120.0}]}
            `;
            
            const contentList = [{type: "text", text: promptText}];
            for (const b64 of base64Images) {
                contentList.push({
                    type: "image_url",
                    image_url: {url: `data:image/jpeg;base64,${b64}`}
                });
            }
            
            const maxRetries = 3;
            let lastExc = null;
            
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    updateProgress(30 + attempt * 10, `第 ${attempt} 次请求大模型，请稍候...`);
                    
                    const response = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: endpointId,
                            messages: [{role: "user", content: contentList}]
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`API请求失败: ${response.status}`);
                    }
                    
                    const result = await response.json();
                    const resultText = result.choices[0].message.content.trim();
                    
                    // 提取JSON
                    const match = resultText.match(/\{.*\}/s);
                    if (!match) {
                        throw new Error(`AI返回内容中未找到有效JSON: ${resultText.slice(0,200)}`);
                    }
                    
                    const data = JSON.parse(match[0]);
                    return data;
                } catch (e) {
                    lastExc = e;
                    if (attempt < maxRetries) {
                        const wait = attempt * 2000;
                        updateProgress(30 + attempt * 10, `第 ${attempt} 次请求失败，${wait/1000}s后重试...`);
                        await new Promise(r => setTimeout(r, wait));
                    }
                }
            }
            
            throw new Error(`大模型请求重试${maxRetries}次均失败: ${lastExc.message}`);
        }

        // 更新结果卡片
        function updateResultCard(type, isOk, hintText) {
            const icon = document.getElementById(type + 'Icon');
            const statusIcon = document.getElementById(type + 'StatusIcon');
            const statusText = document.getElementById(type + 'StatusText');
            const hint = document.getElementById(type + 'Hint');
            
            // 更新图标颜色
            const iconSvg = icon.querySelector('svg');
            
            if (isOk === true) {
                icon.classList.remove('error');
                icon.classList.add('success');
                iconSvg.style.stroke = '#08a06e';
                statusIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#08a06e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                statusText.textContent = '一致';
                statusText.className = 'result-card-status-text success';
            } else if (isOk === false) {
                icon.classList.remove('success');
                icon.classList.add('error');
                iconSvg.style.stroke = '#d81e06';
                statusIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d81e06" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
                statusText.textContent = '错误';
                statusText.className = 'result-card-status-text error';
            } else {
                icon.classList.remove('success', 'error');
                statusIcon.innerHTML = '';
                statusText.textContent = '待核实';
                statusText.className = 'result-card-status-text';
            }
            
            if (hintText) {
                hint.textContent = hintText;
            }
        }

        // 显示结果
        function displayResult(imageTotalDue, imageSummary, reconciliationList) {
            const resultCard = document.getElementById('resultCard');
            const downloadBtn = document.getElementById('downloadBtn');
            
            resultCard.classList.remove('hidden');
            
            let hasQtyError = false;
            let hasAmtError = false;
            hasErrors = false;
            
            // 遍历对账结果，检查是否有错误
            for (const item of reconciliationList) {
                if (item.hasError) {
                    hasErrors = true;
                    if (item.errorType === 'qty' || item.errorType === 'both') {
                        hasQtyError = true;
                    }
                    if (item.errorType === 'amount' || item.errorType === 'both' || item.errorType === 'missing') {
                        hasAmtError = true;
                    }
                }
            }
            
            const totalMatches = Math.abs(imageTotalDue - tableTotal) < 1.0;
            
            // 更新卡片状态
            updateResultCard('amount', totalMatches, `¥${imageTotalDue.toFixed(2)} vs ¥${tableTotal.toFixed(2)}`);
            updateResultCard('qty', !hasQtyError, hasQtyError ? '存在数量差异' : 'AI识别 vs 表格数量');
            updateResultCard('price', !hasAmtError, hasAmtError ? '存在金额差异' : 'AI识别 vs 表格单价');
            
            // 显示下载按钮
            downloadBtn.classList.remove('hidden');
        }

        // 导出报告
        function exportReport() {
            const date = new Date();
            const dateStr = `${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}_${date.getHours().toString().padStart(2,'0')}${date.getMinutes().toString().padStart(2,'0')}`;
            
            let rows = [];
            
            if (!hasErrors) {
                // 数据全部一致
                rows.push("对账结果：所有数据一致");
                rows.push("");
                rows.push("表格单价/总价/数量和供应商开单一致");
            } else {
                // 数据有误
                rows.push("款号,表格数量,表格单价,供应商开单数量,供应商开单价格");
                
                for (const item of reconciliationList) {
                    if (item.hasError) {
                        const tblUnitPrice = item.tblQty > 0 ? (item.tblAmount / item.tblQty).toFixed(2) : '0.00';
                        const imgUnitPrice = item.imgQty > 0 ? (item.imgAmount / item.imgQty).toFixed(2) : '0.00';
                        rows.push(`${item.code},${item.tblQty},${tblUnitPrice},${item.imgQty},${imgUnitPrice}`);
                    }
                }
            }
            
            const csvContent = "\uFEFF" + rows.join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `对账报告_${dateStr}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('报告导出成功');
        }

        // 开始计算
        async function startCalculate() {
            if (!tableSummary || !imageFile) {
                showToast('请先上传完整的文件');
                return;
            }
            
            const startBtn = document.getElementById('startBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            startBtn.disabled = true;
            startBtn.innerHTML = '<span class="loading"></span> 核算中...';
            downloadBtn.classList.add('hidden');
            
            try {
                // 重置结果
                document.getElementById('resultCard').classList.add('hidden');
                
                updateProgress(5, '正在读取表格数据...');
                await new Promise(r => setTimeout(r, 100));
                
                updateProgress(15, '表格读取完成，正在处理图片...');
                const base64Images = await processImageForAI(imageFile);
                
                updateProgress(20, `图片已处理为 ${base64Images.length} 张切片，正在调用大模型...`);
                
                // 调用AI
                const aiData = await callVisionModel(base64Images);
                
                updateProgress(65, '大模型返回数据，正在解析...');
                
                // 处理AI返回的数据
                const imageTotalDue = parseFloat(aiData.总计 || 0);
                const rawItems = aiData.明细 || [];
                
                const combinedImageData = {};
                const codeRegex = /^[78]\d{3,4}$/;
                
                for (const item of rawItems) {
                    const code = String(item.款号 || '').trim();
                    if (!codeRegex.test(code)) continue;
                    
                    const qty = parseFloat(item.数量 || 0);
                    const totalAmount = parseFloat(item.总金额 || 0);
                    
                    if (!combinedImageData[code]) {
                        combinedImageData[code] = {数量: 0, 金额: 0};
                    }
                    combinedImageData[code].数量 += qty;
                    combinedImageData[code].金额 += totalAmount;
                }
                
                updateProgress(80, '数据采集完毕，正在逐款核对...');
                
                // 对账结果列表
                reconciliationList = [];
                
                // 遍历图片数据与表格对比
                for (const [code, imgData] of Object.entries(combinedImageData)) {
                    const imgQty = imgData.数量;
                    const imgAmount = imgData.金额;
                    let hasError = false;
                    let errorType = '';
                    
                    if (!tableSummary[code]) {
                        hasError = true;
                        errorType = 'missing';
                    } else {
                        const tblData = tableSummary[code];
                        const tblQty = tblData.数量;
                        const tblAmount = tblData.结算金额;
                        
                        if (Math.round(tblQty) !== Math.round(imgQty)) {
                            hasError = true;
                            errorType = errorType ? 'both' : 'qty';
                        }
                        
                        if (Math.abs(tblAmount - imgAmount) > 0.1) {
                            hasError = true;
                            errorType = errorType ? 'both' : 'amount';
                        }
                        
                        reconciliationList.push({
                            code: code,
                            tblQty: tblQty,
                            tblAmount: tblAmount,
                            imgQty: imgQty,
                            imgAmount: imgAmount,
                            hasError: hasError,
                            errorType: errorType
                        });
                    }
                }
                
                // 检查表格中是否有图片中未找到的款号
                for (const [code, tblData] of Object.entries(tableSummary)) {
                    if (!combinedImageData[code]) {
                        reconciliationList.push({
                            code: code,
                            tblQty: tblData.数量,
                            tblAmount: tblData.结算金额,
                            imgQty: 0,
                            imgAmount: 0,
                            hasError: true,
                            errorType: 'missing'
                        });
                    }
                }
                
                updateProgress(100, '核对完成！');
                
                // 显示结果
                displayResult(imageTotalDue, combinedImageData, reconciliationList);
                
                startBtn.innerHTML = '✓ 核算完成';
                startBtn.classList.remove('btn-primary');
                startBtn.classList.add('btn-download');
                startBtn.disabled = false;
                startBtn.onclick = null;
                
            } catch (e) {
                showToast('处理失败：' + e.message);
                startBtn.disabled = false;
                startBtn.innerHTML = '开始核算';
                startBtn.classList.add('btn-primary');
            }
        }

        // 重置
        function resetAll() {
            // 重置上传区域
            document.getElementById('excelZone').classList.remove('success');
            document.getElementById('imageZone').classList.remove('success');
            document.getElementById('excelFileName').textContent = '';
            document.getElementById('imageFileName').textContent = '';
            document.getElementById('excelInput').value = '';
            document.getElementById('imageInput').value = '';
            
            // 重置数据
            excelData = null;
            tableSummary = null;
            tableTotal = 0;
            imageFile = null;
            reconciliationList = [];
            hasErrors = false;
            
            // 隐藏结果
            document.getElementById('resultCard').classList.add('hidden');
            document.getElementById('downloadBtn').classList.add('hidden');
            
            // 重置进度
            updateProgress(0, '等待上传文件...');
            
            // 重置按钮
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = true;
            startBtn.innerHTML = '开始核算';
            startBtn.classList.remove('btn-download');
            startBtn.classList.add('btn-primary');
            startBtn.onclick = startCalculate;
            
            checkReady();
        }

        // 初始化
        window.onload = function() {
            loadConfig();
            
            // 监听配置输入变化
            document.getElementById('apiKey').addEventListener('input', checkReady);
            document.getElementById('endpointId').addEventListener('input', checkReady);
            
            checkReady();
        };
    </script>



</body></html>
