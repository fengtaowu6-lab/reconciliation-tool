<body>
    <div class="container">
        <!-- 标题栏 -->
        <div class="header">
            <div class="logo">📊</div>
            <div class="header-title">
                <h1>来货智能对账系统<span class="version">V3.0</span></h1>
                <div class="header-subtitle">AI 智能核对 · 精准高效</div>
            </div>
            <button class="config-btn" onclick="toggleConfig()">⚙️ API配置</button>
        </div>

        <!-- 配置面板 -->
        <div class="config-panel" id="configPanel">
            <h3>🔧 API 配置</h3>
            <div class="config-item">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="输入您的火山方舟API Key">
            </div>
            <div class="config-item">
                <label>Endpoint ID</label>
                <input type="text" id="endpointId" placeholder="输入您的模型Endpoint ID">
            </div>
            <button class="config-save-btn" onclick="saveConfig()">保存配置</button>
            <p class="config-tip">配置仅保存在您的本地浏览器中，不会上传到任何服务器</p>
        </div>

        <!-- 提示条 -->
        <div class="notice-bar show" id="noticeBar">
            <strong>🎯 当前未配置API</strong>
            请先点击右上角的「API配置」填写您的火山方舟API信息，才能使用AI图片分析功能
        </div>

        <!-- 上传区域 -->
        <div class="card">
            <div class="card-title">
                <span class="icon">📁</span>
                上传对账文件
            </div>
            <div class="upload-grid">
                <div class="upload-zone" id="excelZone" onclick="document.getElementById(&#39;excelInput&#39;).click()">
                    <div class="check-icon">✓</div>
                    <div class="icon">📊</div>
                    <div class="title">上传到货表格</div>
                    <div class="subtitle">支持 .xlsx / .csv</div>
                    <div class="file-name" id="excelFileName"></div>
                    <input type="file" id="excelInput" accept=".xlsx,.csv" onchange="handleExcelUpload(event)">
                </div>
                <div class="upload-zone" id="imageZone" onclick="document.getElementById(&#39;imageInput&#39;).click()">
                    <div class="check-icon">✓</div>
                    <div class="icon">🖼️</div>
                    <div class="title">上传来货图片</div>
                    <div class="subtitle">支持 .jpg / .png</div>
                    <div class="file-name" id="imageFileName"></div>
                    <input type="file" id="imageInput" accept=".jpg,.jpeg,.png" onchange="handleImageUpload(event)">
                </div>
            </div>
        </div>

        <!-- 进度区域 -->
        <div class="card" id="progressCard">
            <div class="card-title">
                <span class="icon">⏳</span>
                核对进度
            </div>
            <div class="progress-section">
                <div class="circle-progress">
                    <svg width="64" height="64">
                        <defs>
                            <lineargradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:#10B981"></stop>
                                <stop offset="100%" style="stop-color:#34D399"></stop>
                            </lineargradient>
                        </defs>
                        <circle class="bg" cx="32" cy="32" r="28"></circle>
                        <circle class="progress" id="progressCircle" cx="32" cy="32" r="28" stroke-dasharray="175.9" stroke-dashoffset="175.9" style="stroke-dashoffset: 175.929;"></circle>
                    </svg>
                    <span class="percent" id="progressPercent">0%</span>
                </div>
                <div class="progress-info">
                    <div class="progress-status" id="progressStatus">请先完成API配置</div>
                    <div class="progress-bar">
                        <div class="fill" id="progressFill" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 结果区域 -->
        <div class="card hidden" id="resultCard">
            <div class="card-title">
                <span class="icon">📊</span>
                核对结果

                    <div class="result-circle pending" id="amountCircle">?</div>
                    <div class="result-label">总金额</div>
                    <div class="result-status" id="amountStatus">待核实</div>
                </div>
                <div class="result-item">
                    <div class="result-circle pending" id="qtyCircle">?</div>
                    <div class="result-label">数量</div>
                    <div class="result-status" id="qtyStatus">待核实</div>
                </div>
                <div class="result-item">
                    <div class="result-circle pending" id="priceCircle">?</div>
                    <div class="result-label">单款总价</div>
                    <div class="result-status" id="priceStatus">待核实</div>
                </div>
            </div>
        </div>

        <!-- 错误列表 -->

            <div class="card-title">
                <span class="icon">⚠️</span>
                差异明细
            </div>
            <div class="error-list" id="errorList"></div>
        </div>

        <!-- 成功信息 -->

            <div class="card-title">
                <span class="icon">🎉</span>
                核对完成
            </div>
            <div class="success-info">
                <div class="amount" id="finalAmount">¥0.00</div>
                <div class="desc" id="finalDesc">所有商品核对一致</div>
            </div>
        </div>

        <!-- 按钮区域 -->
        <div class="card">
            <div class="btn-group">
                <button class="btn btn-secondary" id="resetBtn" onclick="resetAll()">
                    ↺ 核算下一批
                </button>
                <button class="btn btn-export hidden" id="exportBtn" onclick="exportErrors()">
                    📥 导出差异报告
                </button>
                <button class="btn btn-primary" id="startBtn" onclick="startCalculate()" disabled="">
                    开始核算
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 全局变量
        let excelData = null;
        let tableSummary = null;
        let tableTotal = 0;
        let imageFile = null;
        let currentErrors = [];
        let imageTotal = 0;

        // 智能切片分级上限
        const MAX_SLICES = 32;
        const COMPRESS_THRESHOLD = 16000;

        // Toast 提示
        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        // 更新进度
        function updateProgress(percent, status) {
            const percentText = Math.round(percent) + '%';
            document.getElementById('progressPercent').textContent = percentText;
            document.getElementById('progressStatus').textContent = status;
            document.getElementById('progressFill').style.width = percent + '%';
            
            // 圆形进度
            const circumference = 2 * Math.PI * 28;
            const offset = circumference - (percent / 100) * circumference;
            document.getElementById('progressCircle').style.strokeDashoffset = offset;
        }

        // 清理款号
        function cleanSpecCode(code) {
            let codeStr = String(code).trim();
            if (codeStr.includes('-')) {
                return codeStr.split('-')[0];
            }
            return codeStr;
        }

        // 切换配置面板
        function toggleConfig() {
            const panel = document.getElementById('configPanel');
            panel.classList.toggle('show');
        }

        // 保存配置
        function saveConfig() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const endpointId = document.getElementById('endpointId').value.trim();
            
            if (!apiKey || !endpointId) {
                showToast('请填写完整的API配置信息');
                return;
            }
            
            localStorage.setItem('reconciliation_api_key', apiKey);
            localStorage.setItem('reconciliation_endpoint', endpointId);
            
            showToast('配置已保存到本地');
            toggleConfig();
            checkNoticeBar();
            checkReady();
        }

        // 加载配置
        function loadConfig() {
            const savedApiKey = localStorage.getItem('reconciliation_api_key');
            const savedEndpoint = localStorage.getItem('reconciliation_endpoint');
            
            if (savedApiKey) {
                document.getElementById('apiKey').value = savedApiKey;
            }
            if (savedEndpoint) {
                document.getElementById('endpointId').value = savedEndpoint;
            }
            
            checkNoticeBar();
        }

        // 检查提示条
        function checkNoticeBar() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const endpointId = document.getElementById('endpointId').value.trim();
            const noticeBar = document.getElementById('noticeBar');
            
            if (!apiKey || !endpointId) {
                noticeBar.classList.add('show');
            } else {
                noticeBar.classList.remove('show');
            }
        }

        // Excel 上传处理
        function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const zone = document.getElementById('excelZone');
            document.getElementById('excelFileName').textContent = file.name;
            zone.classList.add('success');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rawData = XLSX.utils.sheet_to_json(firstSheet);
                    
                    // 处理列名
                    rawData.forEach(row => {
                        Object.keys(row).forEach(key => {
                            const newKey = key.trim();
                            if (newKey !== key) {
                                row[newKey] = row[key];
                                delete row[key];
                            }
                        });
                    });
                    
                    // 检查必需列
                    const requiredCols = ['货品规格编码', '数量', '结算金额'];
                    const firstRow = rawData[0] || {};
                    const missingCols = requiredCols.filter(col => !firstRow.hasOwnProperty(col));
                    
                    if (missingCols.length > 0) {
                        showToast(`表格缺少必需列：${missingCols.join(', ')}`);
                        zone.classList.remove('success');
                        return;
                    }
                    
                    // 处理数据
                    const summary = {};
                    let total = 0;
                    
                    rawData.forEach(row => {
                        const code = cleanSpecCode(row['货品规格编码']);
                        const qty = parseFloat(row['数量']) || 0;
                        const amount = parseFloat(row['结算金额']) || 0;
                        
                        total += amount;
                        
                        if (!summary[code]) {
                            summary[code] = {
                                数量: 0,
                                结算金额: 0
                            };
                        }
                        summary[code].数量 += qty;
                        summary[code].结算金额 += amount;
                    });
                    
                    excelData = rawData;
                    tableSummary = summary;
                    tableTotal = total;
                    
                    showToast(`表格读取成功，共 ${rawData.length} 条记录`);
                    checkReady();
                } catch (err) {
                    showToast('表格解析失败：' + err.message);
                    zone.classList.remove('success');
                    excelData = null;
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // 图片上传处理
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // 检查文件大小
            if (file.size > 20 * 1024 * 1024) {
                showToast('图片文件超过20MB，请压缩后再上传！');
                return;
            }
            
            const zone = document.getElementById('imageZone');
            document.getElementById('imageFileName').textContent = file.name;
            zone.classList.add('success');
            
            imageFile = file;
            showToast('图片上传成功');
            checkReady();
        }

        // 拖拽上传
        ['excelZone', 'imageZone'].forEach(id => {
            const zone = document.getElementById(id);
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.classList.add('dragover');
            });
            zone.addEventListener('dragleave', () => {
                zone.classList.remove('dragover');
            });
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file) {
                    if (id === 'excelZone') {
                        document.getElementById('excelInput').files = e.dataTransfer.files;
                        handleExcelUpload({ target: { files: [file] } });
                    } else {
                        document.getElementById('imageInput').files = e.dataTransfer.files;
                        handleImageUpload({ target: { files: [file] } });
                    }
                }
            });
        });

        // 检查是否准备就绪
        function checkReady() {
            const startBtn = document.getElementById('startBtn');
            const apiKey = document.getElementById('apiKey').value.trim();
            const endpointId = document.getElementById('endpointId').value.trim();
            
            if (tableSummary && imageFile && apiKey && endpointId) {
                startBtn.disabled = false;
                updateProgress(0, '准备就绪，点击开始核算');
            } else {
                startBtn.disabled = true;
                if (!apiKey || !endpointId) {
                    updateProgress(0, '请先完成API配置');
                } else {
                    updateProgress(0, '等待上传文件...');
                }
            }
        }

        // 处理图片切片
        async function processImageForAI(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        let w = img.width;
                        let h = img.height;
                        const base64Images = [];
                        
                        if (h > w * 2) {
                            let slice_h = Math.floor(w * 1.5);
                            let overlap = Math.floor(w * 0.2);
                            let step = slice_h - overlap;
                            
                            let required_slices = Math.ceil(h / step);
                            let target_slices, need_compress;
                            
                            if (required_slices <= 4) {
                                target_slices = 4;
                                need_compress = false;
                            } else if (required_slices <= 8) {
                                target_slices = 8;
                                need_compress = false;
                            } else if (required_slices <= 16) {
                                target_slices = 16;
                                need_compress = false;
                            } else if (required_slices <= MAX_SLICES) {
                                target_slices = required_slices;
                                need_compress = false;
                            } else {
                                target_slices = MAX_SLICES;
                                need_compress = true;
                            }
                            
                            if (need_compress) {
                                const compress_h = step * MAX_SLICES + slice_h - step;
                                const scale = compress_h / h;
                                w = Math.floor(w * scale);
                                h = compress_h;
                                
                                // 压缩图片
                                const canvas = document.createElement('canvas');
                                canvas.width = w;
                                canvas.height = h;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, w, h);
                                img.src = canvas.toDataURL('image/jpeg', 0.9);
                                
                                // 重新计算切片参数
                                slice_h = Math.floor(w * 1.5);
                                step = slice_h - overlap;
                            }
                            
                            const all_slices = [];
                            for (let i = 0; i < h; i += step) {
                                all_slices.push([0, i, w, Math.min(i + slice_h, h)]);
                                if (i + slice_h >= h) break;
                            }
                            
                            let slices;
                            if (all_slices.length > target_slices) {
                                const indices = [];
                                for (let i = 0; i < target_slices; i++) {
                                    indices.push(Math.floor(i * all_slices.length / target_slices));
                                }
                                slices = indices.map(idx => all_slices[idx]);
                            } else {
                                slices = all_slices;
                            }
                            
                            // 保留最后一片
                            const last = [0, Math.max(0, h - slice_h), w, h];
                            if (JSON.stringify(slices[slices.length-1]) !== JSON.stringify(last)) {
                                slices[slices.length-1] = last;
                            }
                            
                            // 生成切片
                            for (const box of slices) {
                                const canvas = document.createElement('canvas');
                                canvas.width = box[2] - box[0];
                                canvas.height = box[3] - box[1];
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, box[0], box[1], box[2]-box[0], box[3]-box[1], 0, 0, canvas.width, canvas.height);
                                const b64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
                                base64Images.push(b64);
                            }
                        } else {
                            // 小图直接转base64
                            base64Images.push(e.target.result.split(',')[1]);
                        }
                        
                        resolve(base64Images);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // 调用大模型
        async function callVisionModel(base64Images) {
            const apiKey = document.getElementById('apiKey').value.trim();
            const endpointId = document.getElementById('endpointId').value.trim();
            
            const promptText = `
            你是一个极其严谨的财务对账助手，负责精准提取发货单图片中的信息。
            ⚠️ 特别说明：为了保证清晰度，我把一张长图切成了 ${base64Images.length} 张短图发给你。
            【重中之重】：这些切片图片的上下边缘有【重叠部分】（为了防止把字切断）。如果你发现两张图的连接处出现了完全一样的商品（款号和数量一样），那是重叠导致的，**绝对不要重复计算！只算一次！**
            要求：
            1. 提取最末尾的"本单欠款"或"合计"金额。
            2. 提取所有的商品明细，列出：款号、数量、总金额。
            ⚠️【严禁幻觉的提取规则】：
            - 【款号】：必须是4位或5位的纯数字，且必须以数字"7"或者"8"开头！其余文字一律忽略。
            - 【数量与金额】：图片上的明细严格遵循公式格式，例如"55元 × 1件= ￥ 55"。务必且只能从这个算式中提取数字，绝对不要自己做乘法！
            请务必只输出合法的 JSON 字符串，格式如下：
            {"总计": 11008.0, "明细": [{"款号": "8851", "数量": 3, "总金额": 120.0}]}
            `;
            
            const contentList = [{type: "text", text: promptText}];
            for (const b64 of base64Images) {
                contentList.push({
                    type: "image_url",
                    image_url: {url: `data:image/jpeg;base64,${b64}`}
                });
            }
            
            const maxRetries = 3;
            let lastExc = null;
            
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    updateProgress(30 + attempt * 10, `第 ${attempt} 次请求大模型，请稍候...`);
                    
                    const response = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: endpointId,
                            messages: [{role: "user", content: contentList}]
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`API请求失败: ${response.status}`);
                    }
                    
                    const result = await response.json();
                    const resultText = result.choices[0].message.content.trim();
                    
                    // 提取JSON
                    const match = resultText.match(/\{.*\}/s);
                    if (!match) {
                        throw new Error(`AI返回内容中未找到有效JSON: ${resultText.slice(0,200)}`);
                    }
                    
                    const data = JSON.parse(match[0]);
                    return data;
                } catch (e) {
                    lastExc = e;
                    if (attempt < maxRetries) {
                        const wait = attempt * 2000;
                        updateProgress(30 + attempt * 10, `第 ${attempt} 次请求失败，${wait/1000}s后重试...`);
                        await new Promise(r => setTimeout(r, wait));
                    }
                }
            }
            
            throw new Error(`大模型请求重试${maxRetries}次均失败: ${lastExc.message}`);
        }

        // 更新状态圆圈
        function updateStatusCircle(type, isOk) {
            const circle = document.getElementById(type + 'Circle');
            const status = document.getElementById(type + 'Status');
            
            circle.classList.remove('pending', 'success', 'error');
            
            if (isOk === true) {
                circle.classList.add('success');
                circle.textContent = '✓';
                status.textContent = '一致';
                status.className = 'result-status success';
            } else if (isOk === false) {
                circle.classList.add('error');
                circle.textContent = '✗';
                status.textContent = '不一致';
                status.className = 'result-status error';
            } else {
                circle.classList.add('pending');
                circle.textContent = '?';
                status.textContent = '待核实';
                status.className = 'result-status';
            }
        }

        // 显示结果
        function displayResult(imageTotalDue, imageSummary, errors) {
            const resultCard = document.getElementById('resultCard');
            const errorCard = document.getElementById('errorCard');
            const successCard = document.getElementById('successCard');
            const exportBtn = document.getElementById('exportBtn');
            
            resultCard.classList.remove('hidden');
            
            let hasQtyError = false;
            let hasAmtError = false;
            
            errors.forEach(err => {
                if (err.includes('数量不一致') || err.includes('款号匹配失败')) {
                    hasQtyError = true;
                }
                if (err.includes('金额不一致') || err.includes('款号匹配失败')) {
                    hasAmtError = true;
                }
            });
            
            const totalMatches = Math.abs(imageTotalDue - tableTotal) < 1.0;
            
            // 更新卡片状态
            updateStatusCircle('amount', totalMatches);
            updateStatusCircle('qty', !hasQtyError);
            updateStatusCircle('price', !hasAmtError);
            
            // 显示错误或成功
            if (errors.length > 0) {
                errorCard.classList.remove('hidden');
                const errorList = document.getElementById('errorList');
                errorList.innerHTML = errors.map(err => 
                    `<div class="error-item">• ${err}</div>`
                ).join('');
                successCard.classList.add('hidden');
                exportBtn.classList.remove('hidden');
            } else {
                errorCard.classList.add('hidden');
                successCard.classList.remove('hidden');
                document.getElementById('finalAmount').textContent = '¥' + imageTotalDue.toLocaleString('zh-CN', { minimumFractionDigits: 2 });
                document.getElementById('finalDesc').textContent = `${Object.keys(imageSummary).length} 款商品全部核对一致`;
                exportBtn.classList.add('hidden');
            }
        }

        // 开始计算
        async function startCalculate() {
            if (!tableSummary || !imageFile) {
                showToast('请先上传完整的文件');
                return;
            }
            
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = true;
            startBtn.innerHTML = '<span class="loading"></span> 核算中...';
            
            try {
                // 重置结果
                document.getElementById('resultCard').classList.add('hidden');
                document.getElementById('errorCard').classList.add('hidden');
                document.getElementById('successCard').classList.add('hidden');
                document.getElementById('exportBtn').classList.add('hidden');
                
                updateProgress(5, '正在读取表格数据...');
                await new Promise(r => setTimeout(r, 100));
                
                updateProgress(15, '表格读取完成，正在处理图片...');
                const base64Images = await processImageForAI(imageFile);
                
                updateProgress(20, `图片已处理为 ${base64Images.length} 张切片，正在调用大模型...`);
                
                // 调用AI
                const aiData = await callVisionModel(base64Images);
                
                updateProgress(65, '大模型返回数据，正在解析...');
                
                // 处理AI返回的数据
                const imageTotalDue = parseFloat(aiData.总计 || 0);
                const rawItems = aiData.明细 || [];
                
                const combinedImageData = {};
                const codeRegex = /^[78]\d{3,4}$/;
                
                for (const item of rawItems) {
                    const code = String(item.款号 || '').trim();
                    if (!codeRegex.test(code)) continue;
                    
                    const qty = parseFloat(item.数量 || 0);
                    const totalAmount = parseFloat(item.总金额 || 0);
                    
                    if (!combinedImageData[code]) {
                        combinedImageData[code] = {数量: 0, 金额: 0};
                    }
                    combinedImageData[code].数量 += qty;
                    combinedImageData[code].金额 += totalAmount;
                }
                
                updateProgress(80, '数据采集完毕，正在逐款核对...');
                
                // 对账
                const errors = [];
                
                for (const [code, imgData] of Object.entries(combinedImageData)) {
                    const imgQty = imgData.数量;
                    const imgAmount = imgData.金额;
                    
                    if (!tableSummary[code]) {
                        errors.push(`【款号匹配失败】原因为：表格中未找到款号 ${code}。`);
                        continue;
                    }
                    
                    const tblData = tableSummary[code];
                    const tblQty = tblData.数量;
                    const tblAmount = tblData.结算金额;
                    
                    if (tblQty !== imgQty) {
                        errors.push(`【数量不一致】款号 ${code}：AI识别数量=${Math.round(imgQty)}，表格数量=${Math.round(tblQty)}。`);
                    }
                    
                    if (Math.abs(tblAmount - imgAmount) > 0.1) {
                        const unitPriceImg = imgQty > 0 ? Math.round(imgAmount / imgQty * 100) / 100 : 0;
                        const unitPriceTbl = tblQty > 0 ? Math.round(tblAmount / tblQty * 100) / 100 : 0;
                        errors.push(`【金额不一致】款号 ${code}：AI识别金额=${imgAmount}（单价=${unitPriceImg}），表格金额=${tblAmount}（单价=${unitPriceTbl}）。`);
                    }
                }
                
                // 保存全局数据
                currentErrors = errors;
                imageTotal = imageTotalDue;
                
                updateProgress(100, '核对完成！');
                
                // 显示结果
                displayResult(imageTotalDue, combinedImageData, errors);
                
                startBtn.innerHTML = '✓ 核算完成';
                startBtn.classList.remove('btn-primary');
                startBtn.classList.add('btn-success');
                
            } catch (e) {
                showToast('处理失败：' + e.message);
                startBtn.disabled = false;
                startBtn.innerHTML = '开始核算';
            }
        }

        // 导出报告
        function exportErrors() {
            if (!currentErrors || currentErrors.length === 0) {
                showToast('没有差异数据可导出');
                return;
            }
            
            // 生成CSV
            const rows = [];
            rows.push("款号,差异类型,AI识别数量,表格数量,数量差值,AI识别金额,表格金额,金额差值,AI识别单价,表格单价");
            
            for (const line of currentErrors) {
                const qtyMatch = line.match(/【数量不一致】款号\s*(\S+)：AI识别数量=(\d+)，表格数量=(\d+)/);
                const amtMatch = line.match(/【金额不一致】款号\s*(\S+)：AI识别金额=([\d.]+)（单价=([\d.]+)），表格金额=([\d.]+)（单价=([\d.]+)）/);
                const failMatch = line.match(/【款号匹配失败】原因为：表格中未找到款号\s*(\S+)/);
                
                if (qtyMatch) {
                    const code = qtyMatch[1];
                    const imgQty = parseInt(qtyMatch[2]);
                    const tblQty = parseInt(qtyMatch[3]);
                    rows.push(`${code},数量不一致,${imgQty},${tblQty},${imgQty - tblQty},,,,,,`);
                } else if (amtMatch) {
                    const code = amtMatch[1];
                    const imgAmt = parseFloat(amtMatch[2]);
                    const imgUnit = parseFloat(amtMatch[3]);
                    const tblAmt = parseFloat(amtMatch[4]);
                    const tblUnit = parseFloat(amtMatch[5]);
                    rows.push(`${code},金额不一致,,,,-,${imgAmt},${tblAmt},${(imgAmt - tblAmt).toFixed(2)},${imgUnit},${tblUnit}`);
                } else if (failMatch) {
                    const code = failMatch[1];
                    rows.push(`${code},款号匹配失败,,,,,,,,,`);
                }
            }
            
            const csvContent = "\uFEFF" + rows.join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            const date = new Date();
            const dateStr = `${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}_${date.getHours().toString().padStart(2,'0')}${date.getMinutes().toString().padStart(2,'0')}`;
            a.download = `对账差异报告_${dateStr}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('差异报告导出成功');
        }

        // 重置
        function resetAll() {
            // 重置上传区域
            document.getElementById('excelZone').classList.remove('success');
            document.getElementById('imageZone').classList.remove('success');
            document.getElementById('excelFileName').textContent = '';
            document.getElementById('imageFileName').textContent = '';
            document.getElementById('excelInput').value = '';
            document.getElementById('imageInput').value = '';
            
            // 重置数据
            excelData = null;
            tableSummary = null;
            tableTotal = 0;
            imageFile = null;
            currentErrors = [];
            
            // 隐藏结果
            document.getElementById('resultCard').classList.add('hidden');
            document.getElementById('errorCard').classList.add('hidden');
            document.getElementById('successCard').classList.add('hidden');
            document.getElementById('exportBtn').classList.add('hidden');
            
            // 重置进度
            updateProgress(0, '等待上传文件...');
            
            // 重置按钮
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = true;
            startBtn.innerHTML = '开始核算';
            startBtn.classList.remove('btn-success');
            startBtn.classList.add('btn-primary');
            
            checkReady();
        }

        // 初始化
        window.onload = function() {
            loadConfig();
            
            // 监听配置输入变化
            document.getElementById('apiKey').addEventListener('input', checkReady);
            document.getElementById('endpointId').addEventListener('input', checkReady);
            
            checkReady();
        };
    </script>
